name: Daily AVI Update

on:
  workflow_dispatch:
  schedule:
    - cron: "08 12 * * *"   # 5:08 AM MST
    - cron: "15 22 * * *"   # 3:15 PM MST

permissions:
  contents: write

concurrency:
  group: avi-data-updates
  cancel-in-progress: false

jobs:
  daily-avi-update:
    runs-on: ubuntu-latest

    env:
      SLEEPER_LEAGUE_ID: ${{ secrets.SLEEPER_LEAGUE_ID }}
      FANTASYPROS_API_KEY: ${{ secrets.FANTASYPROS_API_KEY }}

      SLEEPER_BASE_URL: "https://api.sleeper.app/v1"
      FANTASYPROS_BASE_URL: "https://api.fantasypros.com/public/v2/json"
      FANTASYPROS_API_KEY_HEADER: "x-api-key"
      FANTASYPROS_MAX_REQUESTS_PER_RUN: "45"

      AVI_EARLIEST_SEASON: "2025"
      TRANSACTION_START_WEEK: "0"
      TRANSACTION_END_WEEK: "18"
      AVI_EXPECTED_TEAM_COUNT: "16"
      AVI_MINIMUM_COMPLETED_TRADES: "10"

      AVI_SEASON: "2026"
      AVI_SCORING: "PPR"
      AVI_METHODOLOGY_VERSION: "2026.1"

    steps:
      - name: Check out AVI Core
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install AVI Core
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        id: tests
        run: python -m pytest -q

      - name: Run complete AVI daily update
        id: daily_update
        continue-on-error: true
        run: python -m avi.cli daily-update

      - name: Report update result
        if: always() && steps.tests.outcome == 'success'
        run: |
          echo "Daily update outcome: ${{ steps.daily_update.outcome }}"

          if [ "${{ steps.daily_update.outcome }}" = "failure" ]; then
            echo "::warning::The complete AVI daily update did not finish. Successfully written files will still be uploaded and committed."
          fi

      - name: Upload complete AVI snapshot
        if: always() && steps.tests.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: avi-daily-snapshot
          path: |
            data/raw/
            data/processed/
            knowledge/
          if-no-files-found: error
          retention-days: 30

      - name: Commit updated AVI data
        if: always() && steps.tests.outcome == 'success'
        env:
          UPDATE_OUTCOME: ${{ steps.daily_update.outcome }}
        run: |
          git config user.name "avi-automation"
          git config user.email "avi-automation@users.noreply.github.com"

          git add data knowledge

          if git diff --cached --quiet; then
            echo "No AVI data changes to commit."
            exit 0
          fi

          if [ "$UPDATE_OUTCOME" = "success" ]; then
            COMMIT_MESSAGE="Automated daily AVI update"
          else
            COMMIT_MESSAGE="Automated partial AVI update"
          fi

          git commit -m "$COMMIT_MESSAGE"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} of 3"

            git fetch origin main

            if ! git rebase origin/main; then
              echo "Rebase conflict detected."
              git rebase --abort
              exit 1
            fi

            if git push origin HEAD:main; then
              echo "AVI data pushed successfully."
              exit 0
            fi

            echo "Push attempt ${attempt} failed."
            sleep 5
          done

          echo "Failed to push AVI data after 3 attempts."
          exit 1
