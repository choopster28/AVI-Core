name: Update Sleeper Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sleeper:
    runs-on: ubuntu-latest

    env:
      SLEEPER_LEAGUE_ID: ${{ secrets.SLEEPER_LEAGUE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sleeper Update
        run: |
          python -m src.avi.cli update-sleeper

      - name: Validate Sleeper Data
        run: |
          python -m src.avi.cli validate-sleeper

      - name: Commit updated Sleeper data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet || git commit -m "Manual Sleeper data update"

      - name: Push changes
        run: |
          git push
