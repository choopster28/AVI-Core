name: Daily Sleeper Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  update-sleeper:
    runs-on: ubuntu-latest

    steps:
      - name: Check out AVI Core
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AVI Core
        run: python -m pip install -e .

      - name: Update Sleeper
        env:
          SLEEPER_LEAGUE_ID: ${{ secrets.SLEEPER_LEAGUE_ID }}
          AVI_EARLIEST_SEASON: "2024"
          TRANSACTION_START_WEEK: "0"
          TRANSACTION_END_WEEK: "18"
          AVI_EXPECTED_TEAM_COUNT: "16"
          AVI_MINIMUM_COMPLETED_TRADES: "61"
          AVI_SEASON: "2026"
          AVI_SCORING: "HALF"
          AVI_METHODOLOGY_VERSION: "2026.1"
        run: python -m avi.cli update-sleeper

      - name: Validate Sleeper
        env:
          SLEEPER_LEAGUE_ID: ${{ secrets.SLEEPER_LEAGUE_ID }}
          AVI_EARLIEST_SEASON: "2024"
          AVI_EXPECTED_TEAM_COUNT: "16"
          AVI_MINIMUM_COMPLETED_TRADES: "61"
          AVI_SEASON: "2026"
          AVI_SCORING: "HALF"
        run: python -m avi.cli validate-sleeper

      - name: Upload Sleeper snapshot
        uses: actions/upload-artifact@v4
        with:
          name: avi-sleeper-snapshot
          path: |
            data/raw/sleeper/
            data/processed/trades/
            data/processed/transactions/
            data/processed/validation/sleeper.json
          if-no-files-found: error
          retention-days: 30