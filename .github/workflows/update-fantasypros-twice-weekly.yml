name: Twice-Weekly FantasyPros Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * 1"
    - cron: "0 11 * * 4"

jobs:
  update-fantasypros:
    runs-on: ubuntu-latest

    steps:
      - name: Check out AVI Core
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AVI Core
        run: python -m pip install -e .

      - name: Update FantasyPros
        env:
          FANTASYPROS_API_KEY: ${{ secrets.FANTASYPROS_API_KEY }}
          FANTASYPROS_BASE_URL: "https://api.fantasypros.com/public/v2/json"
          FANTASYPROS_API_KEY_HEADER: "x-api-key"
          AVI_SEASON: "2026"
          AVI_SCORING: "HALF"
          AVI_METHODOLOGY_VERSION: "2026.1"
        run: python -m avi.cli update-fantasypros

      - name: Validate FantasyPros
        env:
          AVI_SEASON: "2026"
          AVI_SCORING: "HALF"
        run: python -m avi.cli validate-fantasypros

      - name: Upload FantasyPros snapshot
        uses: actions/upload-artifact@v4
        with:
          name: avi-fantasypros-snapshot
          path: |
            data/raw/fantasypros/
            data/processed/validation/fantasypros.json
          if-no-files-found: error
          retention-days: 30