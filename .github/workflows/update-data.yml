name: Update AVI Source Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out AVI Core
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AVI Core
        run: python -m pip install -e .

      - name: Download Sleeper history
        env:
          SLEEPER_LEAGUE_ID: ${{ secrets.SLEEPER_LEAGUE_ID }}
          AVI_EARLIEST_SEASON: "2024"
          TRANSACTION_START_WEEK: "0"
          TRANSACTION_END_WEEK: "18"
          AVI_EXPECTED_TEAM_COUNT: "16"
          AVI_MINIMUM_COMPLETED_TRADES: "61"
        run: avi sleeper-update

      - name: Validate Sleeper history
        env:
          SLEEPER_LEAGUE_ID: ${{ secrets.SLEEPER_LEAGUE_ID }}
          AVI_EARLIEST_SEASON: "2024"
          AVI_EXPECTED_TEAM_COUNT: "16"
          AVI_MINIMUM_COMPLETED_TRADES: "61"
        run: avi validate-sleeper

      - name: Download FantasyPros data
        if: ${{ secrets.FANTASYPROS_API_KEY != '' }}
        env:
          FANTASYPROS_API_KEY: ${{ secrets.FANTASYPROS_API_KEY }}
          FANTASYPROS_BASE_URL: ${{ vars.FANTASYPROS_BASE_URL }}
          FANTASYPROS_PLAYERS_PATH: ${{ vars.FANTASYPROS_PLAYERS_PATH }}
          FANTASYPROS_PROJECTIONS_PATH: ${{ vars.FANTASYPROS_PROJECTIONS_PATH }}
          FANTASYPROS_RANKINGS_PATH: ${{ vars.FANTASYPROS_RANKINGS_PATH }}
          FANTASYPROS_INJURIES_PATH: ${{ vars.FANTASYPROS_INJURIES_PATH }}
          FANTASYPROS_NEWS_PATH: ${{ vars.FANTASYPROS_NEWS_PATH }}
        run: avi fantasypros-update

      - name: Upload AVI source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: avi-source-snapshot
          path: |
            data/raw/
            data/processed/
          if-no-files-found: error
          retention-days: 30
